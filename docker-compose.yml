
services:
  postgres:
    image: postgres:15-alpine
    container_name: cindro_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deal_tracker_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_db_password}
      POSTGRES_DB: ${POSTGRES_DB:-deal_tracker_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deal_tracker_user} -d ${POSTGRES_DB:-deal_tracker_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: cindro_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-deal_tracker_user}:${POSTGRES_PASSWORD:-secure_db_password}@postgres:5432/${POSTGRES_DB:-deal_tracker_db}?schema=public
      - JWT_SECRET=${JWT_SECRET:-default_jwt_secret}
      - AUTH_DISABLED=false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: cindro_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: cindro_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@cindro.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
